openapi: 3.1.0
info:
  title: Azure GenAI Backend Lab
  description: Production-minded Azure GenAI backend patterns with Python and FastAPI.
  version: 0.1.0
paths:
  /health:
    get:
      tags:
      - health
      summary: Health Check
      operationId: health_check_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /api/v1/chat:
    post:
      tags:
      - chat
      summary: Chat
      operationId: chat_api_v1_chat_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '400':
          description: 'Input rejected: content filter or invalid input'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Service misconfiguration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '502':
          description: Upstream LLM service failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '503':
          description: Upstream capacity exhausted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '504':
          description: Upstream timeout
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/v1/chat/stream:
    post:
      tags:
      - streaming
      summary: Stream Chat
      operationId: stream_chat_api_v1_chat_stream_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StreamingChatRequest'
        required: true
      responses:
        '200':
          description: "Server-Sent Events stream. Event vocabulary: `message.delta`\
            \ (`{text}`), `message.done` (`{status, incomplete_reason?, correlation_id}`),\
            \ `error` (the error envelope). Exactly one terminal event (`message.done`\
            \ or `error`) ends a normally closed stream; clients must treat EOF without\
            \ a terminal as a failure and must ignore unknown event names. OpenAPI\
            \ cannot express these ordering invariants \u2014 the BDD feature `streaming_response.feature`\
            \ is the executable contract."
          content:
            text/event-stream:
              schema:
                type: string
              example: 'event: message.delta

                data: {"text": "pon"}


                event: message.delta

                data: {"text": "g"}


                event: message.done

                data: {"status": "completed", "correlation_id": "..."}


                '
        '422':
          description: Validation Error
          content:
            text/event-stream:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '400':
          description: 'Input rejected before the stream starts: content filter or
            invalid input'
          content:
            text/event-stream:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Service misconfiguration
          content:
            text/event-stream:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '502':
          description: Upstream LLM service failure
          content:
            text/event-stream:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '503':
          description: Upstream capacity exhausted
          content:
            text/event-stream:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '504':
          description: Upstream timeout
          content:
            text/event-stream:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/v1/rag:
    post:
      tags:
      - rag
      summary: Rag
      operationId: rag_api_v1_rag_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RagRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RagResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
components:
  schemas:
    ChatRequest:
      properties:
        message:
          type: string
          minLength: 1
          title: Message
        conversation_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Conversation Id
          description: Reserved for conversation state (Day 7); accepted but ignored
            today.
      type: object
      required:
      - message
      title: ChatRequest
    ChatResponse:
      properties:
        message:
          type: string
          title: Message
        correlation_id:
          type: string
          title: Correlation Id
      type: object
      required:
      - message
      - correlation_id
      title: ChatResponse
    ErrorDetail:
      properties:
        code:
          type: string
          title: Code
        message:
          type: string
          title: Message
      type: object
      required:
      - code
      - message
      title: ErrorDetail
    ErrorEnvelope:
      properties:
        error:
          $ref: '#/components/schemas/ErrorDetail'
        correlation_id:
          type: string
          title: Correlation Id
      type: object
      required:
      - error
      - correlation_id
      title: ErrorEnvelope
      description: 'The one error shape every non-2xx response uses (Day 3 contract).


        ``correlation_id`` is non-optional: the correlation middleware runs outside

        every exception handler, so an envelope without it is a bug, not a case.'
    HealthResponse:
      properties:
        status:
          type: string
          title: Status
        service:
          type: string
          title: Service
      type: object
      required:
      - status
      - service
      title: HealthResponse
    RagRequest:
      properties:
        question:
          type: string
          minLength: 1
          title: Question
        tenant_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Tenant Id
      type: object
      required:
      - question
      title: RagRequest
    RagResponse:
      properties:
        answer:
          type: string
          title: Answer
        sources:
          items:
            type: string
          type: array
          title: Sources
        correlation_id:
          type: string
          title: Correlation Id
      type: object
      required:
      - answer
      - sources
      - correlation_id
      title: RagResponse
    StreamingChatRequest:
      properties:
        message:
          type: string
          minLength: 1
          title: Message
        conversation_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Conversation Id
          description: Reserved for conversation state (Day 7); accepted but ignored
            today.
      type: object
      required:
      - message
      title: StreamingChatRequest
